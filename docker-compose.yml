version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ledgerproof
      POSTGRES_PASSWORD: ledgerproof
      POSTGRES_DB: ledgerproof
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledgerproof"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
